<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
  <style>
    @font-face {
      font-family: 'Sansation';
      src: url('../public/fonts/Sansation_Light.ttf') format('truetype');
      font-weight: 200;
      font-style: normal;
    }
    @font-face {
      font-family: 'Sansation';
      src: url('../public/fonts/Sansation_Regular.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
    }
  </style>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: transparent;
      user-select: none;
      font-family: 'Pretendard Variable', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    .pet-container {
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: flex-end;
      justify-content: flex-end;
      cursor: pointer;
      position: relative;
      padding: 0 10px 0 0;
    }
    .pet-wrapper {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      -webkit-app-region: no-drag;
      margin-bottom: 0;
    }
    .pet {
      width: 52px;
      height: 52px;
      animation: bounce 2s ease-in-out infinite;
      filter: drop-shadow(0 4px 12px rgba(255, 77, 0, 0.3));
      transition: transform 0.2s;
    }
    .pet img {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      display: block;
    }
    .pet:hover {
      transform: scale(1.15);
      animation-play-state: paused;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    /* Tooltip */
    .tooltip {
      display: none;
      position: absolute;
      bottom: 65px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(26, 26, 26, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: white;
      padding: 4px 12px;
      border-radius: 10px;
      font-size: 11px;
      white-space: nowrap;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
      -webkit-app-region: no-drag;
    }
    .tooltip::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 50%;
      transform: translateX(-50%);
      border-left: 4px solid transparent;
      border-right: 4px solid transparent;
      border-top: 4px solid rgba(26, 26, 26, 0.92);
    }
    .pet-wrapper:hover .tooltip { display: block; }

    /* Speech bubble */
    .speech-bubble {
      position: absolute;
      bottom: 70px;
      right: 10px;
      background: rgba(26, 26, 26, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: #FF4D00;
      padding: 8px 16px;
      border-radius: 14px 14px 4px 14px;
      font-size: 13px;
      font-weight: 400;
      line-height: 1.5;
      max-width: 220px;
      text-align: left;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      -webkit-app-region: no-drag;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease, transform 0.3s ease;
      transform: translateY(8px);
      z-index: 10;
    }
    .speech-bubble.visible {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    /* ===== Menu Panel ===== */
    .menu-panel {
      display: none;
      position: absolute;
      bottom: 70px;
      right: 10px;
      background: rgba(20, 20, 20, 0.88);
      backdrop-filter: blur(24px) saturate(1.4);
      -webkit-backdrop-filter: blur(24px) saturate(1.4);
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.06);
      box-shadow: 0 12px 40px rgba(0,0,0,0.45);
      padding: 6px;
      min-width: 160px;
      z-index: 20;
      -webkit-app-region: no-drag;
    }
    .menu-panel.visible {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }
    .menu-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      color: rgba(255,255,255,0.8);
      font-size: 13px;
      font-weight: 400;
      cursor: pointer;
      border-radius: 10px;
      transition: all 0.15s ease;
    }
    .menu-item:hover {
      background: rgba(255, 77, 0, 0.12);
      color: #FF4D00;
    }
    .menu-icon {
      font-size: 15px;
      width: 20px;
      text-align: center;
    }

    /* ===== Chat Panel (Channel Talk Style) ===== */
    .chat-panel {
      display: none;
      position: absolute;
      bottom: 70px;
      right: 0;
      width: 340px;
      height: 480px;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 16px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.06);
      z-index: 20;
      -webkit-app-region: no-drag;
      flex-direction: column;
      opacity: 0;
      transform: translateY(16px) scale(0.96);
      transition: opacity 0.25s ease, transform 0.25s ease;
    }
    .chat-panel.visible {
      display: flex;
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    /* Chat Header — gradient */
    .chat-header {
      background: linear-gradient(135deg, #FF4D00 0%, #FF6B2B 50%, #FF8A50 100%);
      padding: 18px 18px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: relative;
    }
    .chat-header-avatar {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      border: 2px solid rgba(255,255,255,0.3);
      overflow: hidden;
      flex-shrink: 0;
    }
    .chat-header-avatar img {
      width: 100%;
      height: 100%;
      display: block;
    }
    .chat-header-info {
      flex: 1;
    }
    .chat-header-name {
      color: white;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.2px;
    }
    .chat-header-status {
      color: rgba(255,255,255,0.75);
      font-size: 11px;
      font-weight: 400;
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 2px;
    }
    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #4ADE80;
      display: inline-block;
    }
    .chat-close {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      border: none;
      background: rgba(255,255,255,0.15);
      color: white;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
      flex-shrink: 0;
    }
    .chat-close:hover {
      background: rgba(255,255,255,0.25);
    }

    /* Chat Body */
    .chat-body {
      flex: 1;
      background: #1A1A1A;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .chat-body::-webkit-scrollbar { width: 4px; }
    .chat-body::-webkit-scrollbar-track { background: transparent; }
    .chat-body::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.12);
      border-radius: 2px;
    }

    /* Welcome */
    .chat-welcome {
      text-align: center;
      padding: 12px 0 8px;
    }
    .chat-welcome-avatar {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      margin: 0 auto 10px;
      overflow: hidden;
      box-shadow: 0 4px 12px rgba(255, 77, 0, 0.25);
    }
    .chat-welcome-avatar img {
      width: 100%;
      height: 100%;
      display: block;
    }
    .chat-welcome-text {
      color: rgba(255,255,255,0.5);
      font-size: 12px;
      line-height: 1.5;
    }

    /* Message Row */
    .msg-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }
    .msg-row.user {
      flex-direction: row-reverse;
    }
    .msg-avatar {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .msg-avatar img {
      width: 100%;
      height: 100%;
      display: block;
    }
    .msg-content {
      max-width: 75%;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .msg-row.user .msg-content {
      align-items: flex-end;
    }
    .msg-bubble {
      font-size: 13px;
      line-height: 1.55;
      padding: 10px 14px;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .msg-row.assistant .msg-bubble {
      background: #2A2A2A;
      color: rgba(255,255,255,0.9);
      border-radius: 4px 16px 16px 16px;
    }
    .msg-row.user .msg-bubble {
      background: #FF4D00;
      color: white;
      border-radius: 16px 4px 16px 16px;
    }
    .msg-time {
      font-size: 10px;
      color: rgba(255,255,255,0.25);
      padding: 0 4px;
    }

    /* Typing indicator */
    .typing-indicator {
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }
    .typing-dots {
      background: #2A2A2A;
      border-radius: 4px 16px 16px 16px;
      padding: 12px 18px;
      display: flex;
      gap: 4px;
      align-items: center;
    }
    .typing-dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      animation: typingBounce 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.15s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.3; }
      30% { transform: translateY(-4px); opacity: 1; }
    }

    /* Chat Input */
    .chat-input-area {
      background: #1A1A1A;
      padding: 12px 14px;
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .chat-input-wrapper {
      flex: 1;
      background: #2A2A2A;
      border-radius: 20px;
      display: flex;
      align-items: center;
      padding: 0 4px 0 16px;
      transition: box-shadow 0.2s;
    }
    .chat-input-wrapper:focus-within {
      box-shadow: 0 0 0 2px rgba(255, 77, 0, 0.3);
    }
    .chat-input {
      flex: 1;
      background: transparent;
      border: none;
      padding: 10px 0;
      color: white;
      font-size: 13px;
      font-family: 'Pretendard Variable', -apple-system, sans-serif;
      outline: none;
    }
    .chat-input::placeholder {
      color: rgba(255,255,255,0.3);
    }
    .chat-send {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: none;
      background: #FF4D00;
      color: white;
      font-size: 15px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .chat-send:hover {
      background: #E64500;
      transform: scale(1.05);
    }
    .chat-send:disabled {
      background: #333;
      color: rgba(255,255,255,0.2);
      cursor: not-allowed;
      transform: none;
    }
    .chat-send svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }

    /* ===== DND Prompt ===== */
    .dnd-prompt {
      position: absolute;
      bottom: 70px;
      right: 10px;
      background: rgba(26, 26, 26, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      padding: 16px 20px;
      width: 240px;
      z-index: 25;
      -webkit-app-region: no-drag;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .dnd-prompt.visible {
      opacity: 1;
      pointer-events: auto;
    }
    .dnd-prompt-text {
      color: #FF4D00;
      font-size: 13px;
      line-height: 1.5;
      text-align: center;
      margin-bottom: 14px;
    }
    .dnd-buttons {
      display: flex;
      gap: 8px;
      justify-content: center;
    }
    .dnd-btn {
      padding: 7px 20px;
      border-radius: 10px;
      border: none;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    .dnd-btn.yes { background: #FF4D00; color: white; }
    .dnd-btn.yes:hover { background: #E64500; }
    .dnd-btn.no { background: rgba(255,255,255,0.1); color: white; }
    .dnd-btn.no:hover { background: rgba(255,255,255,0.18); }

    /* DND badge */
    .dnd-badge {
      display: none;
      position: absolute;
      top: -2px;
      right: -2px;
      width: 12px;
      height: 12px;
      background: #FF4D00;
      border-radius: 50%;
      border: 2px solid #1A1A1A;
    }
    .dnd-badge.active { display: block; }

    /* Unread badge on pet */
    .unread-badge {
      display: none;
      position: absolute;
      top: -4px;
      right: -4px;
      min-width: 18px;
      height: 18px;
      border-radius: 9px;
      background: #FF4D00;
      color: white;
      font-size: 10px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 5px;
      border: 2px solid #1A1A1A;
    }
    .unread-badge.active { display: flex; }

    /* Hide tooltip when panels are open */
    .menu-panel.visible ~ .pet-wrapper .tooltip,
    .chat-panel.visible ~ .pet-wrapper .tooltip,
    .speech-bubble.visible ~ .pet-wrapper .tooltip {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="pet-container">
    <div class="speech-bubble" id="speechBubble" onclick="dismissBubble()"></div>

    <!-- Menu Panel -->
    <div class="menu-panel" id="menuPanel">
      <div class="menu-item" onclick="onMenuChat()">
        <span class="menu-icon">💬</span> Chat
      </div>
      <div class="menu-item" onclick="onMenuAction('briefing')">
        <span class="menu-icon">📋</span> Briefing
      </div>
      <div class="menu-item" onclick="onMenuAction('tasks')">
        <span class="menu-icon">✅</span> Tasks
      </div>
      <div class="menu-item" onclick="onMenuAction('tokens')">
        <span class="menu-icon">💰</span> Tokens
      </div>
      <div class="menu-item" onclick="onMenuAction('open')">
        <span class="menu-icon">🚀</span> Open Ditto
      </div>
    </div>

    <!-- Chat Panel (Channel Talk Style) -->
    <div class="chat-panel" id="chatPanel">
      <!-- Header -->
      <div class="chat-header">
        <div class="chat-header-avatar">
          <img src="../public/logo.png" alt="Ditto" />
        </div>
        <div class="chat-header-info">
          <div class="chat-header-name">Ditto</div>
          <div class="chat-header-status">
            <span class="status-dot"></span>
            Active now
          </div>
        </div>
        <button class="chat-close" onclick="closeAll()" title="Close">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 1L13 13M13 1L1 13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        </button>
      </div>

      <!-- Messages -->
      <div class="chat-body" id="chatMessages">
        <div class="chat-welcome">
          <div class="chat-welcome-avatar">
            <img src="../public/logo.png" alt="Ditto" />
          </div>
          <div class="chat-welcome-text">
            Ditto AI Assistant<br/>
            무엇이든 물어보세요
          </div>
        </div>
      </div>

      <!-- Input -->
      <div class="chat-input-area">
        <div class="chat-input-wrapper">
          <input class="chat-input" id="chatInput" type="text" placeholder="메시지를 입력하세요..." />
          <button class="chat-send" id="chatSend" onclick="sendChat()">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          </button>
        </div>
      </div>
    </div>

    <!-- DND Prompt -->
    <div class="dnd-prompt" id="dndPrompt">
      <div class="dnd-prompt-text" id="dndPromptText"></div>
      <div class="dnd-buttons">
        <button class="dnd-btn yes" onclick="respondDnd(true)">네</button>
        <button class="dnd-btn no" onclick="respondDnd(false)">아니요</button>
      </div>
    </div>

    <div class="pet-wrapper" id="petWrapper">
      <div class="tooltip">클릭하여 메뉴 열기</div>
      <div class="pet" id="petIcon">
        <img src="../public/logo.png" alt="Ditto" />
        <div class="dnd-badge" id="dndBadge"></div>
      </div>
    </div>
  </div>

  <script>
    let bubbleTimer = null;
    let menuOpen = false;
    let chatOpen = false;
    let chatSending = false;

    const DEFAULT_SIZE = { width: 250, height: 160 };
    const EXPANDED_SIZE = { width: 250, height: 360 };
    const CHAT_SIZE = { width: 360, height: 560 };

    // ===== Drag + Click/Double-click handling =====
    let clickTimer = null;
    let isDragging = false;
    let dragStartX = 0;
    let dragStartY = 0;
    const DRAG_THRESHOLD = 5;
    const petWrapper = document.getElementById('petWrapper');

    petWrapper.addEventListener('mousedown', (e) => {
      e.preventDefault();
      e.stopPropagation();
      isDragging = false;
      dragStartX = e.screenX;
      dragStartY = e.screenY;
      if (window.electronAPI && window.electronAPI.startDrag) {
        window.electronAPI.startDrag();
      }

      const onMouseMove = (ev) => {
        const dx = Math.abs(ev.screenX - dragStartX);
        const dy = Math.abs(ev.screenY - dragStartY);
        if (dx > DRAG_THRESHOLD || dy > DRAG_THRESHOLD) {
          isDragging = true;
          if (window.electronAPI && window.electronAPI.dragMove) {
            window.electronAPI.dragMove(ev.screenX, ev.screenY);
          }
        }
      };

      const onMouseUp = () => {
        document.removeEventListener('mousemove', onMouseMove);
        document.removeEventListener('mouseup', onMouseUp);

        if (!isDragging) {
          if (clickTimer) {
            clearTimeout(clickTimer);
            clickTimer = null;
            openApp();
            closeAll();
          } else {
            clickTimer = setTimeout(() => {
              clickTimer = null;
              toggleMenu();
            }, 250);
          }
        }
      };

      document.addEventListener('mousemove', onMouseMove);
      document.addEventListener('mouseup', onMouseUp);
    });

    // ===== Close on outside click / ESC =====
    document.addEventListener('click', (e) => {
      const menuPanel = document.getElementById('menuPanel');
      const chatPanel = document.getElementById('chatPanel');
      if (menuOpen && !menuPanel.contains(e.target) && !petWrapper.contains(e.target)) {
        closeAll();
      }
      if (chatOpen && !chatPanel.contains(e.target) && !petWrapper.contains(e.target) && !menuPanel.contains(e.target)) {
        closeAll();
      }
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeAll();
    });

    // ===== App open =====
    function openApp() {
      if (window.electronAPI) window.electronAPI.openMain();
    }

    // ===== Menu =====
    function toggleMenu() {
      if (chatOpen) return;
      if (menuOpen) {
        closeAll();
      } else {
        dismissBubble();
        menuOpen = true;
        document.getElementById('menuPanel').classList.add('visible');
        resizeWindow(EXPANDED_SIZE.width, EXPANDED_SIZE.height);
      }
    }

    function onMenuAction(action) {
      closeAll();
      if (window.electronAPI && window.electronAPI.triggerAction) {
        window.electronAPI.triggerAction(action);
      }
    }

    function onMenuChat() {
      menuOpen = false;
      document.getElementById('menuPanel').classList.remove('visible');
      chatOpen = true;
      const panel = document.getElementById('chatPanel');
      panel.style.display = 'flex';
      resizeWindow(CHAT_SIZE.width, CHAT_SIZE.height);
      // Trigger animation after display change
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          panel.classList.add('visible');
        });
      });
      setTimeout(() => {
        document.getElementById('chatInput').focus();
      }, 150);
    }

    function closeAll() {
      menuOpen = false;
      chatOpen = false;
      document.getElementById('menuPanel').classList.remove('visible');
      const chatPanel = document.getElementById('chatPanel');
      chatPanel.classList.remove('visible');
      // Wait for animation to finish before hiding
      setTimeout(() => {
        if (!chatOpen) chatPanel.style.display = 'none';
      }, 250);
      resizeWindow(DEFAULT_SIZE.width, DEFAULT_SIZE.height);
    }

    // ===== Window resize =====
    function resizeWindow(w, h) {
      if (window.electronAPI && window.electronAPI.resizePetWindow) {
        window.electronAPI.resizePetWindow(w, h);
      }
    }

    // ===== Time formatting =====
    function getTimeStr() {
      const now = new Date();
      return now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', hour12: false });
    }

    // ===== Chat =====
    function sendChat() {
      const input = document.getElementById('chatInput');
      const message = input.value.trim();
      if (!message || chatSending) return;

      chatSending = true;
      document.getElementById('chatSend').disabled = true;
      input.value = '';

      addChatMessage('user', message);

      // Show typing indicator
      const typingId = showTypingIndicator();

      if (window.electronAPI && window.electronAPI.sendChat) {
        window.electronAPI.sendChat(message).then((response) => {
          removeElement(typingId);
          if (response) {
            addChatMessage('assistant', response);
          }
          chatSending = false;
          document.getElementById('chatSend').disabled = false;
          document.getElementById('chatInput').focus();
        }).catch(() => {
          removeElement(typingId);
          addChatMessage('assistant', '오류가 발생했습니다. 다시 시도해주세요.');
          chatSending = false;
          document.getElementById('chatSend').disabled = false;
        });
      }
    }

    let msgCounter = 0;

    function addChatMessage(role, text) {
      const container = document.getElementById('chatMessages');
      const id = 'msg-' + (++msgCounter);

      const row = document.createElement('div');
      row.id = id;
      row.className = 'msg-row ' + role;

      if (role === 'assistant') {
        const avatar = document.createElement('div');
        avatar.className = 'msg-avatar';
        avatar.innerHTML = '<img src="../public/logo.png" alt="Ditto" />';
        row.appendChild(avatar);
      }

      const content = document.createElement('div');
      content.className = 'msg-content';

      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      bubble.textContent = text;
      content.appendChild(bubble);

      const time = document.createElement('div');
      time.className = 'msg-time';
      time.textContent = getTimeStr();
      content.appendChild(time);

      row.appendChild(content);
      container.appendChild(row);
      container.scrollTop = container.scrollHeight;
      return id;
    }

    function showTypingIndicator() {
      const container = document.getElementById('chatMessages');
      const id = 'typing-' + (++msgCounter);

      const row = document.createElement('div');
      row.id = id;
      row.className = 'typing-indicator';

      const avatar = document.createElement('div');
      avatar.className = 'msg-avatar';
      avatar.innerHTML = '<img src="../public/logo.png" alt="Ditto" />';
      row.appendChild(avatar);

      const dots = document.createElement('div');
      dots.className = 'typing-dots';
      dots.innerHTML = '<span></span><span></span><span></span>';
      row.appendChild(dots);

      container.appendChild(row);
      container.scrollTop = container.scrollHeight;
      return id;
    }

    function removeElement(id) {
      const el = document.getElementById(id);
      if (el) el.remove();
    }

    // Enter to send
    document.getElementById('chatInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendChat();
      }
    });

    // ===== Speech Bubble =====
    function showBubble(message) {
      const bubble = document.getElementById('speechBubble');
      bubble.textContent = message;
      bubble.classList.add('visible');
      if (bubbleTimer) clearTimeout(bubbleTimer);
      bubbleTimer = setTimeout(() => dismissBubble(), 8000);
    }

    function dismissBubble() {
      const bubble = document.getElementById('speechBubble');
      bubble.classList.remove('visible');
      if (bubbleTimer) { clearTimeout(bubbleTimer); bubbleTimer = null; }
    }

    // Listen for messages from main process
    if (window.electronAPI && window.electronAPI.onPetMessage) {
      window.electronAPI.onPetMessage((message) => showBubble(message));
    }

    // ===== DND Prompt =====
    function showDndPrompt(meetingTitle) {
      const prompt = document.getElementById('dndPrompt');
      const text = document.getElementById('dndPromptText');
      text.textContent = `"${meetingTitle}" 미팅이 시작돼요!\n방해금지 모드로 바꿀까요?`;
      prompt.classList.add('visible');
      dismissBubble();
      resizeWindow(EXPANDED_SIZE.width, EXPANDED_SIZE.height);
    }

    function respondDnd(accepted) {
      document.getElementById('dndPrompt').classList.remove('visible');
      resizeWindow(DEFAULT_SIZE.width, DEFAULT_SIZE.height);
      if (window.electronAPI && window.electronAPI.respondDnd) {
        window.electronAPI.respondDnd(accepted);
      }
      if (accepted) {
        document.getElementById('dndBadge').classList.add('active');
        showBubble('방해금지 모드 ON');
      }
    }

    if (window.electronAPI && window.electronAPI.onDndPrompt) {
      window.electronAPI.onDndPrompt((meetingTitle) => showDndPrompt(meetingTitle));
    }
    if (window.electronAPI && window.electronAPI.onDndEnd) {
      window.electronAPI.onDndEnd(() => {
        document.getElementById('dndBadge').classList.remove('active');
        showBubble('미팅 끝! 방해금지 해제했어요');
      });
    }
  </script>
</body>
</html>
