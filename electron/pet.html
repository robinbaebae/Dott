<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    /* ===== CSS Variables — Light mode (default) ===== */
    :root {
      --accent: #7B5B8B;
      --accent-light: #9B82A8;
      --primary: #D8C4D4;
      --bg-dark: #F0EAEE;
      --bg-card: #FDFAFC;
      --bg-bubble: rgba(123, 91, 139, 0.08);
      --text: #1A1A1A;
      --text-muted: #7E6E78;
      --border: rgba(123, 91, 139, 0.18);
      --radius: 14px;
      --radius-lg: 18px;
      --radius-sm: 10px;
      --font: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif;
      --scrollbar-thumb: rgba(0, 0, 0, 0.08);
      --scrollbar-thumb-hover: rgba(0, 0, 0, 0.15);
      --overlay-bg: rgba(0, 0, 0, 0.04);
      --overlay-bg-hover: rgba(0, 0, 0, 0.08);
      --code-bg: rgba(0, 0, 0, 0.06);
    }
    /* ===== Dark mode ===== */
    html.dark {
      --accent: #9B82A8;
      --accent-light: #A89BA0;
      --primary: #D4BFD0;
      --bg-dark: #1A191C;
      --bg-card: #242028;
      --bg-bubble: rgba(155, 130, 168, 0.12);
      --text: rgba(237, 232, 239, 0.88);
      --text-muted: rgba(237, 232, 239, 0.40);
      --border: rgba(155, 130, 168, 0.16);
      --scrollbar-thumb: rgba(255, 255, 255, 0.06);
      --scrollbar-thumb-hover: rgba(255, 255, 255, 0.12);
      --overlay-bg: rgba(255, 255, 255, 0.06);
      --overlay-bg-hover: rgba(255, 255, 255, 0.10);
      --code-bg: rgba(255, 255, 255, 0.08);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: transparent;
      user-select: none;
      font-family: var(--font);
    }

    /* ===== Pet Container ===== */
    .pet-container {
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: flex-end;
      justify-content: flex-end;
      cursor: pointer;
      position: relative;
      padding: 0 10px 0 0;
    }

    .pet-wrapper {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      -webkit-app-region: no-drag;
      margin-bottom: 0;
    }

    /* ===== Pet Icon — no drop shadow ===== */
    .pet {
      width: 48px;
      height: 48px;
      position: relative;
      animation: float 3s ease-in-out infinite;
      transition: transform 0.3s ease;
    }
    .pet img {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      display: block;
    }
    .pet:hover {
      transform: scale(1.08);
      animation-play-state: paused;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    /* ===== Tooltip ===== */
    .tooltip {
      display: none;
      position: absolute;
      bottom: 58px;
      right: 0;
      background: var(--bg-dark);
      color: var(--text);
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 400;
      white-space: nowrap;
      border: 1px solid var(--border);
      -webkit-app-region: no-drag;
    }
    .tooltip::after {
      content: '';
      position: absolute;
      bottom: -4px;
      right: 16px;
      border-left: 4px solid transparent;
      border-right: 4px solid transparent;
      border-top: 4px solid var(--bg-dark);
    }
    .pet-wrapper:hover .tooltip { display: block; }

    /* ===== Speech Bubble ===== */
    .speech-bubble {
      position: absolute;
      bottom: 64px;
      right: 10px;
      background: #000000;
      color: #FFFFFF;
      padding: 10px 14px;
      border-radius: 12px 12px 4px 12px;
      font-size: 13px;
      font-weight: 500;
      line-height: 1.5;
      max-width: 240px;
      text-align: left;
      -webkit-app-region: no-drag;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease, transform 0.3s ease;
      transform: translateY(8px);
      z-index: 10;
    }
    .speech-bubble.visible {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    /* ===== Chat Panel ===== */
    .chat-panel {
      display: none;
      position: absolute;
      bottom: 64px;
      right: 0;
      width: 360px;
      height: 580px;
      border-radius: var(--radius-lg);
      overflow: hidden;
      border: 1px solid var(--border);
      z-index: 20;
      -webkit-app-region: no-drag;
      flex-direction: column;
      opacity: 0;
      transform: translateY(12px) scale(0.96);
      transition: opacity 0.25s ease, transform 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .chat-panel.visible {
      display: flex;
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    /* ===== Chat Header ===== */
    .chat-header {
      background: var(--bg-dark);
      padding: 14px 14px 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      border-bottom: 1px solid var(--border);
    }
    .chat-header-top {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .chat-header-avatar {
      width: 30px;
      height: 30px;
      border-radius: 9px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .chat-header-avatar img {
      width: 100%;
      height: 100%;
      display: block;
    }
    .chat-header-info { flex: 1; }
    .chat-header-name {
      color: var(--text);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: -0.01em;
    }
    .chat-header-status {
      color: var(--text-muted);
      font-size: 10px;
      font-weight: 400;
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 1px;
    }
    .status-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #4ADE80;
      display: inline-block;
    }
    .chat-close {
      width: 26px;
      height: 26px;
      border-radius: 7px;
      border: none;
      background: var(--overlay-bg);
      color: var(--text-muted);
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, color 0.2s;
      flex-shrink: 0;
    }
    .chat-close:hover { background: var(--overlay-bg-hover); color: var(--text); }

    /* ===== Quick Actions ===== */
    .quick-actions {
      display: flex;
      gap: 5px;
    }
    .quick-action {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 9px;
      background: var(--overlay-bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text-muted);
      font-size: 10px;
      font-family: var(--font);
      font-weight: 400;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      white-space: nowrap;
    }
    .quick-action:hover:not(:disabled) {
      background: var(--overlay-bg-hover);
      color: var(--text);
    }
    .quick-action:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .quick-action-icon {
      font-size: 11px;
    }

    /* ===== Action Cards ===== */
    .action-card {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 11px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: rgba(139, 123, 160, 0.08);
      margin-top: 4px;
      cursor: pointer;
      transition: background 0.2s;
      font-size: 11px;
      color: var(--text);
    }
    .action-card:hover {
      background: rgba(139, 123, 160, 0.16);
    }
    .action-card-icon {
      font-size: 14px;
      flex-shrink: 0;
    }
    .action-card-body {
      flex: 1;
      min-width: 0;
    }
    .action-card-title {
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .action-card-sub {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 1px;
    }
    .action-card-arrow {
      color: var(--text-muted);
      font-size: 12px;
      flex-shrink: 0;
    }

    /* ===== Chat Body ===== */
    .chat-body {
      flex: 1;
      background: var(--bg-card);
      overflow-y: auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .chat-body::-webkit-scrollbar { width: 3px; }
    .chat-body::-webkit-scrollbar-track { background: transparent; }
    .chat-body::-webkit-scrollbar-thumb {
      background: var(--scrollbar-thumb);
      border-radius: 2px;
    }
    .chat-body::-webkit-scrollbar-thumb:hover {
      background: var(--scrollbar-thumb-hover);
    }

    /* ===== Welcome ===== */
    .chat-welcome {
      text-align: center;
      padding: 14px 0 8px;
    }
    .chat-welcome-avatar {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      margin: 0 auto 10px;
      overflow: hidden;
    }
    .chat-welcome-avatar img {
      width: 100%;
      height: 100%;
      display: block;
    }
    .chat-welcome-text {
      color: var(--text-muted);
      font-size: 11px;
      font-weight: 400;
      line-height: 1.6;
    }

    /* ===== Messages ===== */
    .msg-row {
      display: flex;
      gap: 7px;
      align-items: flex-end;
    }
    .msg-row.user { flex-direction: row-reverse; }
    .msg-avatar {
      width: 24px;
      height: 24px;
      border-radius: 8px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .msg-avatar img {
      width: 100%;
      height: 100%;
      display: block;
    }
    .msg-content {
      max-width: 78%;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .msg-row.user .msg-content { align-items: flex-end; }
    .msg-bubble {
      font-size: 12px;
      font-weight: 400;
      line-height: 1.6;
      padding: 9px 12px;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .msg-row.assistant .msg-bubble {
      background: var(--bg-bubble);
      color: var(--text);
      border-radius: 4px 14px 14px 14px;
      border: 1px solid var(--border);
    }
    .msg-row.user .msg-bubble {
      background: var(--accent);
      color: white;
      border-radius: 14px 4px 14px 14px;
    }
    .msg-bubble strong { font-weight: 600; }
    .msg-bubble em { font-style: italic; }
    .msg-bubble code {
      background: var(--code-bg);
      padding: 1px 5px;
      border-radius: 4px;
      font-family: 'SF Mono', 'Menlo', monospace;
      font-size: 11px;
    }
    .msg-time {
      font-size: 9px;
      color: var(--text-muted);
      padding: 0 4px;
    }

    /* ===== Typing Indicator ===== */
    .typing-indicator {
      display: flex;
      align-items: flex-end;
      gap: 7px;
    }
    .typing-dots {
      background: var(--bg-bubble);
      border: 1px solid var(--border);
      border-radius: 4px 14px 14px 14px;
      padding: 10px 16px;
      display: flex;
      gap: 4px;
      align-items: center;
    }
    .typing-dots span {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0.4;
      animation: typingPulse 1.4s ease-in-out infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingPulse {
      0%, 60%, 100% { opacity: 0.3; transform: scale(1); }
      30% { opacity: 1; transform: scale(1.15); }
    }

    /* ===== Chat Input ===== */
    .chat-input-area {
      background: var(--bg-dark);
      padding: 10px 12px;
      border-top: 1px solid var(--border);
    }
    .chat-input-wrapper {
      flex: 1;
      background: var(--overlay-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      display: flex;
      align-items: center;
      padding: 0 4px 0 14px;
      transition: border-color 0.2s;
    }
    .chat-input-wrapper:focus-within {
      border-color: rgba(139, 123, 160, 0.4);
    }
    .chat-input {
      flex: 1;
      background: transparent;
      border: none;
      padding: 9px 0;
      color: var(--text);
      font-size: 12px;
      font-family: var(--font);
      font-weight: 400;
      outline: none;
    }
    .chat-input::placeholder {
      color: var(--text-muted);
    }
    .chat-send {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: none;
      background: var(--accent);
      color: white;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .chat-send:hover {
      transform: scale(1.06);
      background: #9E8BB0;
    }
    .chat-send:disabled {
      background: var(--overlay-bg);
      color: var(--text-muted);
      cursor: not-allowed;
      transform: none;
    }
    .chat-send svg {
      width: 13px;
      height: 13px;
      fill: currentColor;
    }

    /* ===== DND Prompt ===== */
    .dnd-prompt {
      position: absolute;
      bottom: 64px;
      right: 10px;
      background: var(--bg-dark);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px 20px;
      width: 240px;
      z-index: 25;
      -webkit-app-region: no-drag;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease, transform 0.3s ease;
      transform: translateY(8px);
    }
    .dnd-prompt.visible {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }
    .dnd-prompt-icon {
      text-align: center;
      font-size: 24px;
      margin-bottom: 8px;
    }
    .dnd-prompt-text {
      color: var(--text);
      font-size: 12px;
      font-weight: 400;
      line-height: 1.6;
      text-align: center;
      margin-bottom: 14px;
    }
    .dnd-buttons {
      display: flex;
      gap: 6px;
      justify-content: center;
    }
    .dnd-btn {
      padding: 7px 20px;
      border-radius: 8px;
      border: none;
      font-size: 12px;
      font-weight: 400;
      font-family: var(--font);
      cursor: pointer;
      transition: all 0.2s;
    }
    .dnd-btn.yes {
      background: var(--accent);
      color: white;
    }
    .dnd-btn.yes:hover {
      background: #9E8BB0;
    }
    .dnd-btn.no {
      background: var(--overlay-bg);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .dnd-btn.no:hover {
      background: var(--overlay-bg-hover);
    }

    /* ===== DND Badge ===== */
    .dnd-badge {
      display: none;
      position: absolute;
      top: -2px;
      right: -2px;
      width: 10px;
      height: 10px;
      background: var(--primary);
      border-radius: 50%;
      border: 2px solid var(--bg-dark);
    }
    .dnd-badge.active { display: block; }

    /* ===== Unread Badge ===== */
    .unread-badge {
      display: none;
      position: absolute;
      top: -3px;
      right: -3px;
      min-width: 16px;
      height: 16px;
      border-radius: 8px;
      background: var(--accent);
      color: white;
      font-size: 9px;
      font-weight: 500;
      align-items: center;
      justify-content: center;
      padding: 0 4px;
      border: 2px solid var(--bg-dark);
    }
    .unread-badge.active { display: flex; }

    /* ===== Pet Mood States ===== */
    .pet-happy .pet {
      filter: drop-shadow(0 0 8px rgba(74, 222, 128, 0.5));
    }
    .pet-happy .pet img {
      filter: brightness(1.05);
    }
    .pet-sad .pet {
      filter: brightness(0.75) saturate(0.6);
      animation: float 5s ease-in-out infinite; /* slower float */
    }

    /* ===== Hide tooltip when panels are open ===== */
    .chat-panel.visible ~ .pet-wrapper .tooltip,
    .speech-bubble.visible ~ .pet-wrapper .tooltip,
    .dnd-prompt.visible ~ .pet-wrapper .tooltip {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="pet-container">
    <div class="speech-bubble" id="speechBubble" onclick="dismissBubble()"></div>

    <!-- Chat Panel -->
    <div class="chat-panel" id="chatPanel">
      <!-- Header -->
      <div class="chat-header">
        <div class="chat-header-top">
          <div class="chat-header-avatar">
            <img src="../public/logo-dott.png" alt="Dott" />
          </div>
          <div class="chat-header-info">
            <div class="chat-header-name">D*tt</div>
            <div class="chat-header-status" id="headerStatus">
              <span class="status-dot"></span>
              <span id="statusText">일정 없음</span>
            </div>
          </div>
          <button class="chat-close" onclick="closeChat()" title="Close">
            <svg width="12" height="12" viewBox="0 0 14 14" fill="none"><path d="M1 1L13 13M13 1L1 13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          </button>
        </div>
        <!-- Quick Actions -->
        <div class="quick-actions">
          <button class="quick-action" onclick="showCalendar()">
            <span class="quick-action-icon">📅</span> Calendar
          </button>
          <button class="quick-action" onclick="showEmails()">
            <span class="quick-action-icon">📧</span> Email
          </button>
          <button class="quick-action" onclick="showTasks()">
            <span class="quick-action-icon">✅</span> Tasks
          </button>
          <button class="quick-action" onclick="onAction('open')">
            <span class="quick-action-icon">↗</span> Open
          </button>
        </div>
      </div>

      <!-- Messages -->
      <div class="chat-body" id="chatMessages">
        <div class="chat-welcome">
          <div class="chat-welcome-avatar">
            <img src="../public/logo-dott.png" alt="Dott" />
          </div>
          <div class="chat-welcome-text">
            D*tt Assistant<br/>
            무엇을 도와드릴까요?
          </div>
        </div>
      </div>

      <!-- Input -->
      <div class="chat-input-area">
        <div class="chat-input-wrapper">
          <input class="chat-input" id="chatInput" type="text" placeholder="메시지를 입력하세요..." />
          <button class="chat-send" id="chatSend" onclick="sendChat()">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          </button>
        </div>
      </div>
    </div>

    <!-- DND Prompt -->
    <div class="dnd-prompt" id="dndPrompt">
      <div class="dnd-prompt-icon">🔕</div>
      <div class="dnd-prompt-text" id="dndPromptText"></div>
      <div class="dnd-buttons">
        <button class="dnd-btn yes" onclick="respondDnd(true)">네</button>
        <button class="dnd-btn no" onclick="respondDnd(false)">아니요</button>
      </div>
    </div>

    <div class="pet-wrapper" id="petWrapper">
      <div class="tooltip">뭐 도와줄까요?</div>
      <div class="pet" id="petIcon">
        <img src="../public/logo-dott.png" alt="Dott" />
        <div class="dnd-badge" id="dndBadge"></div>
      </div>
    </div>
  </div>

  <script>
    let bubbleTimer = null;
    let chatOpen = false;
    let chatSending = false;
    let chatHistory = [];
    const CHAT_HISTORY_MAX = 50;
    let greetingShownToday = false;

    // ===== Timeout helper =====
    function fetchWithTimeout(fn, timeoutMs = 15000) {
      return new Promise((resolve, reject) => {
        const timer = setTimeout(() => reject(new Error('timeout')), timeoutMs);
        fn().then((result) => {
          clearTimeout(timer);
          resolve(result);
        }).catch((err) => {
          clearTimeout(timer);
          reject(err);
        });
      });
    }

    const DEFAULT_SIZE = { width: 250, height: 140 };
    const CHAT_SIZE = { width: 380, height: 660 };

    // ===== Drag + Click handling =====
    let isDragging = false;
    let dragStartX = 0;
    let dragStartY = 0;
    const DRAG_THRESHOLD = 5;
    const petWrapper = document.getElementById('petWrapper');

    petWrapper.addEventListener('mousedown', (e) => {
      e.preventDefault();
      e.stopPropagation();
      isDragging = false;
      dragStartX = e.screenX;
      dragStartY = e.screenY;
      if (window.electronAPI && window.electronAPI.startDrag) {
        window.electronAPI.startDrag();
      }

      const onMouseMove = (ev) => {
        const dx = Math.abs(ev.screenX - dragStartX);
        const dy = Math.abs(ev.screenY - dragStartY);
        if (dx > DRAG_THRESHOLD || dy > DRAG_THRESHOLD) {
          isDragging = true;
          if (window.electronAPI && window.electronAPI.dragMove) {
            window.electronAPI.dragMove(ev.screenX, ev.screenY);
          }
        }
      };

      const onMouseUp = () => {
        document.removeEventListener('mousemove', onMouseMove);
        document.removeEventListener('mouseup', onMouseUp);
        if (!isDragging) {
          toggleChat();
        }
      };

      document.addEventListener('mousemove', onMouseMove);
      document.addEventListener('mouseup', onMouseUp);
    });

    // ===== Close on outside click / ESC =====
    document.addEventListener('click', (e) => {
      const chatPanel = document.getElementById('chatPanel');
      if (chatOpen && !chatPanel.contains(e.target) && !petWrapper.contains(e.target)) {
        closeChat();
      }
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeChat();
    });

    // ===== Chat Toggle =====
    function toggleChat() {
      if (chatOpen) {
        closeChat();
      } else {
        openChat();
      }
    }

    let historyLoaded = false;

    function openChat() {
      dismissBubble();
      chatOpen = true;
      const panel = document.getElementById('chatPanel');
      panel.style.display = 'flex';
      resizeWindow(CHAT_SIZE.width, CHAT_SIZE.height);
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          panel.classList.add('visible');
        });
      });
      setTimeout(() => {
        document.getElementById('chatInput').focus();
      }, 150);
      updateNextMeeting();

      // Load chat history on first open
      if (!historyLoaded) {
        historyLoaded = true;
        loadChatHistory();
        // Smart greeting (Phase 4)
        if (!greetingShownToday) {
          greetingShownToday = true;
          showSmartGreeting();
        }
      }
    }

    async function showSmartGreeting() {
      try {
        const lines = [];
        // Tasks
        if (window.electronAPI && window.electronAPI.getTasks) {
          try {
            const data = await window.electronAPI.getTasks();
            if (data) {
              const tasks = Array.isArray(data) ? data : [];
              const pending = tasks.filter((t) => t.status === 'todo' || t.status === 'in_progress');
              const now = new Date();
              const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
              const tomorrow = new Date(todayStart); tomorrow.setDate(tomorrow.getDate() + 1);
              const todayDue = pending.filter((t) => {
                if (!t.due_date) return false;
                const d = new Date(t.due_date);
                return d >= todayStart && d < tomorrow;
              });
              if (pending.length > 0) lines.push(`📝 할 일 ${pending.length}개${todayDue.length > 0 ? `, 오늘 마감 ${todayDue.length}개` : ''}`);
            }
          } catch {}
        }
        // Next meeting
        if (window.electronAPI && window.electronAPI.getNextMeeting) {
          try {
            const meeting = await window.electronAPI.getNextMeeting();
            if (meeting) lines.push(`📅 다음 미팅 ${meeting.time} · ${meeting.summary}`);
          } catch {}
        }
        // Emails
        if (window.electronAPI && window.electronAPI.getEmails) {
          try {
            const data = await window.electronAPI.getEmails();
            if (data) {
              const emails = Array.isArray(data) ? data : (data.emails || []);
              const unread = emails.filter((e) => e.isUnread);
              if (unread.length > 0) lines.push(`📧 읽지 않은 메일 ${unread.length}건`);
            }
          } catch {}
        }
        if (lines.length > 0) {
          const hour = new Date().getHours();
          const greeting = hour < 12 ? '아침' : hour < 18 ? '오후' : '저녁';
          addChatMessage('assistant', `좋은 ${greeting}이에요!\n\n${lines.join('\n')}\n\n무엇을 도와드릴까요?`);
        }
      } catch {}
    }

    function loadChatHistory() {
      if (!window.electronAPI || !window.electronAPI.getChatHistory) return;
      window.electronAPI.getChatHistory().then((data) => {
        if (!data || !data.messages || data.messages.length === 0) return;
        // Remove welcome message
        const welcome = document.querySelector('.chat-welcome');
        if (welcome) welcome.remove();
        data.messages.forEach((msg) => {
          addChatMessage(msg.role === 'user' ? 'user' : 'assistant', msg.content);
          chatHistory.push({ role: msg.role, content: msg.content });
        });
        if (chatHistory.length > CHAT_HISTORY_MAX) chatHistory.splice(0, chatHistory.length - CHAT_HISTORY_MAX);
      }).catch(() => {});
    }

    function updateNextMeeting() {
      if (window.electronAPI && window.electronAPI.getNextMeeting) {
        window.electronAPI.getNextMeeting().then((meeting) => {
          const dot = document.querySelector('.status-dot');
          const text = document.getElementById('statusText');
          if (meeting) {
            dot.style.background = '#8B7BA0';
            text.textContent = `다음 미팅 ${meeting.time} · ${meeting.summary}`;
          } else {
            dot.style.background = '#4ADE80';
            text.textContent = '오늘 남은 일정 없음';
          }
        }).catch(() => {});
      }
    }

    function closeChat() {
      chatOpen = false;
      const chatPanel = document.getElementById('chatPanel');
      chatPanel.classList.remove('visible');
      setTimeout(() => {
        if (!chatOpen) chatPanel.style.display = 'none';
      }, 300);
      resizeWindow(DEFAULT_SIZE.width, DEFAULT_SIZE.height);
    }

    // ===== Quick Action =====
    function onAction(action) {
      closeChat();
      if (window.electronAPI && window.electronAPI.triggerAction) {
        window.electronAPI.triggerAction(action);
      }
    }

    // ===== Quick Action disable/enable helpers =====
    function disableQuickActions() {
      document.querySelectorAll('.quick-action').forEach((btn) => { btn.disabled = true; });
    }
    function enableQuickActions() {
      document.querySelectorAll('.quick-action').forEach((btn) => { btn.disabled = false; });
    }

    // ===== Calendar =====
    function showCalendar() {
      if (!window.electronAPI || !window.electronAPI.getCalendarEvents) return;
      disableQuickActions();
      const typingId = showTypingIndicator();

      fetchWithTimeout(() => window.electronAPI.getCalendarEvents()).then((data) => {
        removeElement(typingId);
        enableQuickActions();
        if (!data) {
          addChatMessage('assistant', '캘린더 정보를 불러올 수 없습니다.');
          return;
        }
        if (!data.connected) {
          addChatMessage('assistant', '구글 캘린더가 연결되지 않았어요.\nDott 앱에서 Google 계정을 연결해주세요.');
          return;
        }
        const events = data.events || [];
        if (events.length === 0) {
          addChatMessage('assistant', '📅 오늘 일정이 없어요.\n\n채팅으로 "내일 2시에 미팅 잡아줘" 같이 말하면 일정을 등록할 수 있어요.');
          return;
        }

        let msg = `📅 오늘 ${events.length}건의 일정\n\n`;
        events.forEach((evt) => {
          const start = new Date(evt.start?.dateTime || evt.start?.date || evt.start);
          const hh = start.getHours().toString().padStart(2, '0');
          const mm = start.getMinutes().toString().padStart(2, '0');
          const timeStr = evt.allDay ? '종일' : `${hh}:${mm}`;
          msg += `• ${timeStr}  ${evt.title}\n`;
        });
        addChatMessage('assistant', msg.trim());
      }).catch(() => {
        removeElement(typingId);
        enableQuickActions();
        addChatMessage('assistant', '캘린더 정보를 불러올 수 없습니다.');
      });
    }

    // ===== Email =====
    function showEmails() {
      if (!window.electronAPI || !window.electronAPI.getEmails) return;
      disableQuickActions();
      const typingId = showTypingIndicator();

      fetchWithTimeout(() => window.electronAPI.getEmails()).then((data) => {
        removeElement(typingId);
        if (!data) {
          addChatMessage('assistant', '이메일 정보를 불러올 수 없습니다.');
          return;
        }
        const emails = Array.isArray(data) ? data : (data.emails || []);
        const unread = emails.filter((e) => e.isUnread);

        if (unread.length === 0) {
          addChatMessage('assistant', '📧 읽지 않은 메일이 없어요.');
          return;
        }

        let msg = `📧 읽지 않은 메일 ${unread.length}건\n\n`;
        unread.slice(0, 5).forEach((email) => {
          const from = email.from.split('<')[0].trim() || email.from;
          msg += `• ${from}\n  ${email.subject}\n`;
        });
        if (unread.length > 5) {
          msg += `\n...외 ${unread.length - 5}건`;
        }
        msg += '\n\n답장이 필요하면 "답장해줘"라고 말해주세요.';
        addChatMessage('assistant', msg.trim());
      }).catch(() => {
        removeElement(typingId);
        addChatMessage('assistant', '이메일 정보를 불러올 수 없습니다.');
      }).finally(() => {
        enableQuickActions();
      });
    }

    // ===== Tasks =====
    function showTasks() {
      if (!window.electronAPI || !window.electronAPI.getTasks) return;
      disableQuickActions();
      const typingId = showTypingIndicator();

      fetchWithTimeout(() => window.electronAPI.getTasks()).then((data) => {
        removeElement(typingId);
        if (!data) {
          addChatMessage('assistant', '태스크 정보를 불러올 수 없습니다.');
          return;
        }
        const tasks = Array.isArray(data) ? data : [];
        const now = new Date();
        const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        const tomorrow = new Date(todayStart);
        tomorrow.setDate(tomorrow.getDate() + 1);

        const pending = tasks.filter((t) => t.status === 'todo' || t.status === 'in_progress');
        const todayDue = pending.filter((t) => {
          if (!t.due_date) return false;
          const d = new Date(t.due_date);
          return d >= todayStart && d < tomorrow;
        });
        const overdue = tasks.filter((t) => {
          if (t.status === 'done' || !t.due_date) return false;
          return new Date(t.due_date) < todayStart;
        });

        if (pending.length === 0) {
          addChatMessage('assistant', '✅ 진행 중인 태스크가 없어요!');
          return;
        }

        let msg = `📝 할 일 ${pending.length}개`;
        if (todayDue.length > 0) msg += ` | 오늘 마감 ${todayDue.length}개`;
        if (overdue.length > 0) msg += ` | ⚠️ 지연 ${overdue.length}개`;
        msg += '\n';

        if (todayDue.length > 0) {
          msg += '\n**오늘 마감**\n';
          todayDue.forEach((t) => { msg += `• ${t.title}\n`; });
        }
        if (overdue.length > 0) {
          msg += '\n**지연됨**\n';
          overdue.slice(0, 3).forEach((t) => { msg += `• ${t.title}\n`; });
          if (overdue.length > 3) msg += `...외 ${overdue.length - 3}개\n`;
        }

        const other = pending.filter((t) => !todayDue.includes(t) && !overdue.includes(t));
        if (other.length > 0) {
          msg += '\n**진행 중**\n';
          other.slice(0, 5).forEach((t) => { msg += `• ${t.title}\n`; });
          if (other.length > 5) msg += `...외 ${other.length - 5}개\n`;
        }

        addChatMessage('assistant', msg.trim());
      }).catch(() => {
        removeElement(typingId);
        addChatMessage('assistant', '태스크 정보를 불러올 수 없습니다.');
      }).finally(() => {
        enableQuickActions();
      });
    }

    function showTokenUsage() {
      if (!window.electronAPI || !window.electronAPI.getTokenUsage) return;

      const typingId = showTypingIndicator();

      window.electronAPI.getTokenUsage().then((data) => {
        removeElement(typingId);

        if (!data) {
          addChatMessage('assistant', '토큰 정보를 불러올 수 없습니다.');
          return;
        }

        const formatK = (n) => {
          if (n >= 1000000) return `${(n / 1000000).toFixed(1)}M`;
          if (n >= 1000) return `${(n / 1000).toFixed(1)}K`;
          return `${n}`;
        };

        const now = new Date();
        const resetDate = new Date(now.getFullYear(), now.getMonth() + 1, 1);
        const daysLeft = Math.ceil((resetDate - now) / (1000 * 60 * 60 * 24));
        const resetStr = `${resetDate.getMonth() + 1}월 ${resetDate.getDate()}일`;

        let msg = '';
        if (data.todayTotal === 0 && data.monthTotal === 0) {
          msg += `아직 이번달 사용 기록이 없어요.\n\n`;
          msg += `채팅을 시작하면 토큰이 집계됩니다.\n`;
          msg += `${daysLeft}일 후 (${resetStr}) 리셋돼요.`;
        } else {
          msg += `💰 토큰 사용량\n\n`;
          msg += `오늘  ${formatK(data.todayTotal)} 토큰`;
          msg += ` (입력 ${formatK(data.todayIn)} / 출력 ${formatK(data.todayOut)})\n`;
          msg += `이번달  ${formatK(data.monthTotal)} 토큰`;
          msg += ` (입력 ${formatK(data.monthIn)} / 출력 ${formatK(data.monthOut)})\n\n`;
          msg += `${daysLeft}일 후 (${resetStr}) 리셋돼요.`;
        }

        addChatMessage('assistant', msg);
      }).catch(() => {
        removeElement(typingId);
        addChatMessage('assistant', '토큰 정보를 불러올 수 없습니다.');
      });
    }

    // ===== Window resize =====
    function resizeWindow(w, h) {
      if (window.electronAPI && window.electronAPI.resizePetWindow) {
        window.electronAPI.resizePetWindow(w, h);
      }
    }

    // ===== Time formatting =====
    function getTimeStr() {
      const now = new Date();
      return now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', hour12: false });
    }

    // ===== Chat =====
    function sendChat() {
      const input = document.getElementById('chatInput');
      const message = input.value.trim();
      if (!message || chatSending) return;

      chatSending = true;
      document.getElementById('chatSend').disabled = true;
      input.value = '';

      addChatMessage('user', message);
      chatHistory.push({ role: 'user', content: message });
      if (chatHistory.length > CHAT_HISTORY_MAX) chatHistory.splice(0, chatHistory.length - CHAT_HISTORY_MAX);

      const typingId = showTypingIndicator();

      const recentHistory = chatHistory.slice(-8);

      if (window.electronAPI && window.electronAPI.sendChat) {
        fetchWithTimeout(() => window.electronAPI.sendChat(message, recentHistory)).then((response) => {
          removeElement(typingId);
          if (response && typeof response === 'object') {
            // Structured response with actions
            addChatMessage('assistant', response.text || '');
            chatHistory.push({ role: 'assistant', content: response.text || '' });
            if (response.actions) addActionCards(response.actions);
          } else if (response) {
            addChatMessage('assistant', response);
            chatHistory.push({ role: 'assistant', content: response });
          }
          if (chatHistory.length > CHAT_HISTORY_MAX) chatHistory.splice(0, chatHistory.length - CHAT_HISTORY_MAX);
          chatSending = false;
          document.getElementById('chatSend').disabled = false;
          document.getElementById('chatInput').focus();
        }).catch((err) => {
          removeElement(typingId);
          const msg = err && err.message === 'timeout' ? '응답 시간이 초과됐어요. 다시 시도해주세요.' : '오류가 발생했습니다. 다시 시도해주세요.';
          addChatMessage('assistant', msg);
          chatSending = false;
          document.getElementById('chatSend').disabled = false;
        });
      }
    }

    let msgCounter = 0;

    function renderMarkdown(text) {
      return text
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/`(.+?)`/g, '<code>$1</code>')
        .replace(/\n/g, '<br>');
    }

    function addChatMessage(role, text) {
      const container = document.getElementById('chatMessages');
      const id = 'msg-' + (++msgCounter);

      const row = document.createElement('div');
      row.id = id;
      row.className = 'msg-row ' + role;

      if (role === 'assistant') {
        const avatar = document.createElement('div');
        avatar.className = 'msg-avatar';
        avatar.innerHTML = '<img src="../public/logo-dott.png" alt="Dott" />';
        row.appendChild(avatar);
      }

      const content = document.createElement('div');
      content.className = 'msg-content';

      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      if (role === 'assistant') {
        bubble.innerHTML = renderMarkdown(text);
      } else {
        bubble.textContent = text;
      }
      content.appendChild(bubble);

      const time = document.createElement('div');
      time.className = 'msg-time';
      time.textContent = getTimeStr();
      content.appendChild(time);

      row.appendChild(content);
      container.appendChild(row);
      container.scrollTop = container.scrollHeight;
      return id;
    }

    // ===== Action Cards =====
    function addActionCards(actions) {
      if (!actions) return;
      const container = document.getElementById('chatMessages');

      function createCard(icon, title, sub, onclick) {
        const card = document.createElement('div');
        card.className = 'action-card';
        card.innerHTML = `
          <span class="action-card-icon">${icon}</span>
          <div class="action-card-body">
            <div class="action-card-title">${renderMarkdown(title)}</div>
            ${sub ? `<div class="action-card-sub">${renderMarkdown(sub)}</div>` : ''}
          </div>
          <span class="action-card-arrow">›</span>
        `;
        if (onclick) card.addEventListener('click', onclick);
        container.appendChild(card);
      }

      const openMain = () => { if (window.electronAPI) window.electronAPI.triggerAction('open'); };

      if (actions.taskCreated && actions.taskTitle) {
        createCard('✅', `${actions.taskTitle} 추가 완료`, 'Tasks에서 보기', openMain);
      }
      if (actions.calendarEventCreated) {
        createCard('📅', '일정 등록 완료', 'Calendar에서 보기', openMain);
      }
      if (actions.emailDraft) {
        createCard('📧', '이메일 초안 생성됨', 'Gmail에서 보기', openMain);
      }
      if (actions.bannerId) {
        createCard('🎨', '배너 생성됨', 'Assets에서 보기', openMain);
      }
      if (actions.blogTitle) {
        createCard('📝', `${actions.blogTitle}`, '블로그 초안 보기', openMain);
      }
      if (actions.memoryCreated) {
        createCard('💾', '메모 저장됨', '', null);
      }
      if (actions.taskUpdated && actions.taskUpdateTitle) {
        createCard('✏️', `${actions.taskUpdateTitle} 상태 변경됨`, 'Tasks에서 보기', openMain);
      }
      if (actions.memoCreated && actions.memoTitle) {
        createCard('📋', `메모: ${actions.memoTitle}`, '메모 저장됨', openMain);
      }
      if (actions.scheduleCreated && actions.scheduleTitle) {
        createCard('📆', `${actions.scheduleTitle} 예약됨`, '콘텐츠 캘린더에서 보기', openMain);
      }

      container.scrollTop = container.scrollHeight;
    }

    function showTypingIndicator() {
      const container = document.getElementById('chatMessages');
      const id = 'typing-' + (++msgCounter);

      const row = document.createElement('div');
      row.id = id;
      row.className = 'typing-indicator';

      const avatar = document.createElement('div');
      avatar.className = 'msg-avatar';
      avatar.innerHTML = '<img src="../public/logo-dott.png" alt="Dott" />';
      row.appendChild(avatar);

      const dots = document.createElement('div');
      dots.className = 'typing-dots';
      dots.innerHTML = '<span></span><span></span><span></span>';
      row.appendChild(dots);

      container.appendChild(row);
      container.scrollTop = container.scrollHeight;
      return id;
    }

    function removeElement(id) {
      const el = document.getElementById(id);
      if (el) el.remove();
    }

    // Enter to send (skip during IME composition to fix Korean input)
    document.getElementById('chatInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) {
        e.preventDefault();
        sendChat();
      }
    });

    // ===== Speech Bubble =====
    function showBubble(message) {
      const bubble = document.getElementById('speechBubble');
      bubble.textContent = message;
      bubble.classList.add('visible');
      if (bubbleTimer) clearTimeout(bubbleTimer);
      bubbleTimer = setTimeout(() => dismissBubble(), 8000);
    }

    function dismissBubble() {
      const bubble = document.getElementById('speechBubble');
      bubble.classList.remove('visible');
      if (bubbleTimer) { clearTimeout(bubbleTimer); bubbleTimer = null; }
    }

    // Listen for messages from main process
    if (window.electronAPI && window.electronAPI.onPetMessage) {
      window.electronAPI.onPetMessage((message) => showBubble(message));
    }

    // ===== DND Prompt =====
    function showDndPrompt(meetingTitle) {
      const prompt = document.getElementById('dndPrompt');
      const text = document.getElementById('dndPromptText');
      text.textContent = `"${meetingTitle}" 곧 시작해요!\n집중 모드 켤까요?`;
      prompt.classList.add('visible');
      dismissBubble();
      resizeWindow(260, 280);
    }

    function respondDnd(accepted) {
      document.getElementById('dndPrompt').classList.remove('visible');
      resizeWindow(DEFAULT_SIZE.width, DEFAULT_SIZE.height);
      if (window.electronAPI && window.electronAPI.respondDnd) {
        window.electronAPI.respondDnd(accepted);
      }
      if (accepted) {
        document.getElementById('dndBadge').classList.add('active');
        showBubble('집중 모드 켰어요 🔕');
      }
    }

    if (window.electronAPI && window.electronAPI.onDndPrompt) {
      window.electronAPI.onDndPrompt((meetingTitle) => showDndPrompt(meetingTitle));
    }
    if (window.electronAPI && window.electronAPI.onDndEnd) {
      window.electronAPI.onDndEnd(() => {
        document.getElementById('dndBadge').classList.remove('active');
        showBubble('미팅 끝났어요~ 다시 열일하죠 ✨');
      });
    }

    // ===== Theme sync from main app =====
    function applyTheme(theme) {
      if (theme === 'dark') {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
    }
    if (window.electronAPI && window.electronAPI.onThemeChange) {
      window.electronAPI.onThemeChange((theme) => applyTheme(theme));
    }
    // Request initial theme from main process
    if (window.electronAPI && window.electronAPI.getTheme) {
      window.electronAPI.getTheme().then((theme) => {
        if (theme) applyTheme(theme);
      });
    }

    // Pet mood listener
    if (window.electronAPI && window.electronAPI.onPetMood) {
      window.electronAPI.onPetMood((mood) => {
        const wrapper = document.getElementById('petWrapper');
        wrapper.classList.remove('pet-happy', 'pet-sad');
        if (mood === 'happy') wrapper.classList.add('pet-happy');
        else if (mood === 'sad') wrapper.classList.add('pet-sad');
      });
    }
  </script>
</body>
</html>
