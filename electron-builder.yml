appId: com.codeandbutter.dott
productName: Dott
directories:
  output: dist-electron
files:
  - electron/**/*
  - public/*.png
  - package.json
  - "!node_modules/**/*"
extraResources:
  - from: .next/standalone/server.js
    to: next-standalone/server.js
  - from: .next/standalone/node_modules
    to: next-standalone/node_modules
    filter:
      - "**/*"
  - from: .next/standalone/.next
    to: next-standalone/.next
    filter:
      - "**/*"
  - from: .next/standalone/package.json
    to: next-standalone/package.json
  - from: .next/static
    to: next-standalone/.next/static
    filter:
      - "**/*"
  - from: public
    to: next-standalone/public
    filter:
      - "**/*"
  - from: .env.local
    to: next-standalone/.env.local
mac:
  category: public.app-category.productivity
  icon: public/icon-512.png
  hardenedRuntime: false
  gatekeeperAssess: false
  notarize: false
  entitlements: null
  entitlementsInherit: null
  target:
    - dmg
dmg:
  artifactName: Dott-${version}-${arch}.dmg
  title: Dott
  icon: public/icon-512.png
  iconSize: 80
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
win:
  target:
    - nsis
linux:
  target:
    - AppImage
publish:
  provider: github
  owner: codeandbutter
  repo: dott
  releaseType: release
