appId: com.codeandbutter.dott
productName: Dott
directories:
  output: dist-electron
files:
  - electron/**/*
  - .next/**/*
  - "!.next/dev/**"
  - "!.next/cache/**"
  - public/**/*
  - package.json
  - node_modules/electron-updater/**/*
  - "!node_modules/**/*"
mac:
  category: public.app-category.productivity
  icon: public/icon-512.png
  hardenedRuntime: false
  gatekeeperAssess: false
  notarize: false
  target:
    - dmg
dmg:
  artifactName: Dott-${version}-${arch}.dmg
  title: Dott
  icon: public/icon-512.png
  iconSize: 80
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
win:
  target:
    - nsis
linux:
  target:
    - AppImage
publish:
  provider: github
  owner: codeandbutter
  repo: dott
  releaseType: release
